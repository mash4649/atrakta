
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" style="background:#0f1220;font-family:Arial,Helvetica,sans-serif">
  <style>
    .title{fill:#ffffff;font-size:36px;font-weight:bold}
    .subtitle{fill:#9bd1ff;font-size:18px}
    .box{fill:#1a1f36;stroke:#5aa9ff;stroke-width:2;rx:10}
    .label{fill:#ffffff;font-size:16px}
    .small{fill:#c7d2ff;font-size:14px}
    .arrow{stroke:#9bd1ff;stroke-width:2;marker-end:url(#arrow)}
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9bd1ff"/>
    </marker>
  </defs>

  <text x="60" y="70" class="title">Atrakta Architecture</text>
  <text x="60" y="105" class="subtitle">AI coding runtime that keeps workflows stable across interfaces</text>

  <!-- Interfaces -->
  <rect x="60" y="170" width="250" height="240" class="box"/>
  <text x="85" y="200" class="label">AI Interfaces</text>
  <text x="85" y="230" class="small">Cursor</text>
  <text x="85" y="255" class="small">Claude Code</text>
  <text x="85" y="280" class="small">Codex CLI</text>
  <text x="85" y="305" class="small">VS Code</text>
  <text x="85" y="330" class="small">aider / CLI tools</text>

  <!-- Runtime -->
  <rect x="400" y="140" width="350" height="360" class="box"/>
  <text x="420" y="175" class="label">Atrakta Runtime</text>

  <text x="420" y="210" class="small">Detect</text>
  <text x="420" y="235" class="small">Plan (Task DAG)</text>
  <text x="420" y="260" class="small">Apply (Topo execution)</text>
  <text x="420" y="285" class="small">Gate (Safety + Quality)</text>

  <text x="420" y="330" class="small">Interface resolver</text>
  <text x="420" y="355" class="small">Context resolver</text>
  <text x="420" y="380" class="small">Policy engine</text>

  <!-- Project State -->
  <rect x="900" y="140" width="350" height="360" class="box"/>
  <text x="920" y="175" class="label">Project Operational State</text>

  <text x="920" y="210" class="small">contract.json</text>
  <text x="920" y="235" class="small">events.jsonl (hash chain)</text>
  <text x="920" y="260" class="small">progress.json</text>
  <text x="920" y="285" class="small">task-graph.json</text>
  <text x="920" y="310" class="small">runtime/meta.v2.json</text>

  <!-- Arrows -->
  <line x1="310" y1="260" x2="400" y2="260" class="arrow"/>
  <line x1="750" y1="260" x2="900" y2="260" class="arrow"/>

  <!-- Bottom section -->
  <rect x="300" y="560" width="800" height="200" class="box"/>
  <text x="320" y="600" class="label">Key Properties</text>

  <text x="320" y="640" class="small">• Interface-independent AI development</text>
  <text x="320" y="665" class="small">• Deterministic pipeline (Detect → Plan → Apply)</text>
  <text x="320" y="690" class="small">• Append-only event log for observability</text>
  <text x="320" y="715" class="small">• Resumable AI sessions</text>
  <text x="320" y="740" class="small">• Safety contract and managed-only guard</text>

</svg>
