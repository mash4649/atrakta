name: release

on:
  push:
    branches:
      - main
    paths:
      - "VERSION"
      - "scripts/build/**"
      - ".github/workflows/release.yml"
      - ".github/release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve Release Metadata (CalVer)
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          latest_tag="$(gh release list --repo "${repo}" --limit 1 --json tagName --jq '.[0].tagName // empty' 2>/dev/null || true)"
          if [[ -n "$latest_tag" && ! "$latest_tag" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]+$ ]]; then
            latest_tag=""
          fi
          today="$(date +'%Y.%m.%d')"
          seq=1
          if [[ "$latest_tag" =~ ^([0-9]{4}\.[0-9]{2}\.[0-9]{2})-([0-9]+)$ ]]; then
            if [[ "${BASH_REMATCH[1]}" == "$today" ]]; then
              seq=$((10#${BASH_REMATCH[2]} + 1))
            fi
          fi
          tag="${today}-${seq}"
          version="$(tr -d '\n' < VERSION)"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'previous_tag=%s\n' "$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Build Release Artifacts
        run: ./scripts/build/build_release_artifacts.sh

      - name: Generate Release Notes
        id: notes
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          PREV: ${{ steps.meta.outputs.previous_tag }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$PREV" ]; then
            body="$(gh api -X POST "repos/${REPO}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish="${SHA}" \
              -f previous_tag_name="$PREV" \
              -f configuration_file_path=".github/release.yml" \
              --jq .body)"
          else
            body="$(gh api -X POST "repos/${REPO}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish="${SHA}" \
              -f configuration_file_path=".github/release.yml" \
              --jq .body)"
          fi
          {
            echo 'body<<EOF'
            echo "$body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          version="${{ steps.meta.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release already exists: $tag"
            exit 0
          fi
          pkg_dir=".tmp/release/v${version}/packages"
          checksum=".tmp/release/v${version}/checksums.txt"
          gh release create "$tag" \
            "$pkg_dir"/* \
            "$checksum" \
            --title "$tag (Atrakta v${version})" \
            --notes "${{ steps.notes.outputs.body }}"
