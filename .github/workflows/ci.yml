name: ci

on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "scripts/dev/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "scripts/dev/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Base verification
        run: ./scripts/dev/verify_loop.sh

      - name: SLO regression gate
        run: ./scripts/dev/verify_perf_gate.sh
